<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Runner Game — Вибрация + звёздочки + тряска</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
  <style>
    * {
      user-select: none;
      touch-action: manipulation;
    }
    body {
      margin: 0;
      overflow: hidden;
      background: #0a0f1e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .top-panel {
      position: fixed;
      top: 12px;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 2000;
      pointer-events: none;
    }
    .top-buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      pointer-events: auto;
    }
    .top-buttons button {
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 40px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      padding: 8px 16px;
      min-width: 70px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: 0.07s linear;
      touch-action: manipulation;
      cursor: pointer;
      font-family: monospace;
    }
    .top-buttons button:active {
      transform: scale(0.95);
      background: rgba(100, 150, 220, 0.9);
    }
    .volume-control {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(255,255,255,0.3);
      pointer-events: auto;
    }
    .volume-icon { font-size: 20px; color: white; }
    .volume-slider { width: 120px; height: 4px; -webkit-appearance: none; background: #555; border-radius: 4px; }
    .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: white; cursor: pointer; }
    .volume-value { color: white; font-size: 12px; min-width: 35px; text-align: center; }
    .touch-panel {
      position: fixed;
      bottom: 25px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      z-index: 1800;
      pointer-events: none;
    }
    .move-group {
      display: flex;
      gap: 40px;
      background: rgba(0,0,0,0.3);
      padding: 12px 25px;
      border-radius: 100px;
      backdrop-filter: blur(4px);
      pointer-events: auto;
    }
    .action-group {
      display: flex;
      gap: 40px;
      background: rgba(0,0,0,0.3);
      padding: 12px 25px;
      border-radius: 100px;
      backdrop-filter: blur(4px);
      pointer-events: auto;
      margin-left: 80px;
    }
    .touch-panel button {
      background: rgba(20, 25, 45, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 60px;
      color: white;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 0 2px 3px black;
      width: 75px;
      height: 75px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.4);
      transition: 0.05s linear;
      touch-action: manipulation;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
    }
    .touch-panel button:active {
      transform: scale(0.92);
      background: rgba(100, 150, 220, 0.9);
      border-color: #ffcc88;
    }
    @media (max-width: 700px) {
      .touch-panel button { width: 65px; height: 65px; font-size: 28px; }
      .move-group { gap: 30px; padding: 10px 20px; }
      .action-group { gap: 30px; padding: 10px 20px; margin-left: 50px; }
      .top-buttons button { font-size: 14px; padding: 6px 12px; min-width: 55px; }
      .volume-slider { width: 90px; }
    }
    @media (max-width: 550px) {
      .touch-panel button { width: 55px; height: 55px; font-size: 24px; }
      .move-group { gap: 20px; padding: 8px 15px; }
      .action-group { gap: 20px; padding: 8px 15px; margin-left: 35px; }
      .top-buttons button { font-size: 11px; padding: 5px 8px; min-width: 45px; }
      .volume-slider { width: 70px; }
      .volume-icon { font-size: 16px; }
    }
  </style>
</head>
<body>
<div class="top-panel">
  <div class="top-buttons">
    <button id="btnPause">⏸️ ПАУЗА</button>
    <button id="btnStopEnemies">⏹️ СТОП</button>
    <button id="btnWeather">🌦️ ПОГОДА</button>
    <button id="btnMenu">📜 МЕНЮ</button>
  </div>
  <div class="volume-control">
    <div class="volume-icon" id="audioIcon">🔊</div>
    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="50">
    <div class="volume-value" id="volumeValue">50%</div>
  </div>
</div>
<div class="touch-panel">
  <div class="move-group">
    <button id="btnLeft">◀</button>
    <button id="btnRight">▶</button>
  </div>
  <div class="action-group">
    <button id="btnJump">▲</button>
    <button id="btnCrouch">▼</button>
  </div>
</div>
<script>
let player, enemies, specialEnemies, bonuses;
let isDead = false, deathTimer, lives = 3, hearts = [], isPaused = false, enemiesSpeed = -200, specialEnemiesSpeed = 180, lastDirection = 'right', isCrouching = false, enemiesStopped = false, showMenu = false, menuText, backgroundMusic = null, isMuted = false, currentVolume = 0.5, score = 0, scoreText, scoreFrame;
let doubleJumpActive = false, doubleJumpTimer = null, bonusSpawnTimer = null, canDoubleJump = false, bonusTimerGraphic = null, bonusIcon = null, bonusStartTime = 0;
const BONUS_DURATION = 15000;
let invincibleTimer = null, isInvincible = false, shakeTween = null;
let rainDrops = [], rainStreaks = [], lightningFlash, lightningTimer, currentWeather = 'rain';
let dustParticles, footprints = [], footprintDelay = 0;
let touchLeft = false, touchRight = false, jumpCooldown = false, touchCrouchActive = false;
const game = new Phaser.Game({ type: Phaser.AUTO, scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 800, height: 400 }, physics: { default: 'arcade', arcade: { gravity: { y: 800 } } }, scene: { preload, create, update } });
function preload() {
  this.load.image('bg', 'bg.png'); this.load.image('run1', 'run1.png'); this.load.image('run2', 'run2.png'); this.load.image('run3', 'run3.png'); this.load.image('run4', 'run4.png'); this.load.image('crouch', 'crouch.png'); this.load.image('enemy', 'enemy.png'); this.load.image('enemy2', 'enemy2.png'); this.load.image('enemy3', 'enemy3.png'); this.load.image('heart', 'heart.png'); this.load.image('sneaker', 'sneaker.png'); this.load.audio('bgMusic', 'music.mp3');
}
function create() {
  isDead = false; lives = 3; score = 0; isPaused = false; lastDirection = 'right'; isCrouching = false; enemiesStopped = false; showMenu = false; currentWeather = 'rain'; touchLeft = false; touchRight = false; touchCrouchActive = false; doubleJumpActive = false; canDoubleJump = false; isInvincible = false;
  this.groundY = 320;
  this.bg = this.add.image(400, 200, 'bg'); this.bg.displayWidth = 800; this.bg.displayHeight = 400;
  this.ground = this.physics.add.staticGroup(); const groundBlock = this.ground.create(400, this.groundY + 40).setDisplaySize(800, 40).refreshBody(); groundBlock.visible = false;
  player = this.physics.add.sprite(200, this.groundY, 'run1'); player.setScale(0.25); player.setCollideWorldBounds(true); this.physics.add.collider(player, this.ground); player.body.setSize(55, 58, 1, 2);
  this.anims.create({ key: 'run', frames: [{ key: 'run1' }, { key: 'run2' }, { key: 'run3' }, { key: 'run4' }], frameRate: 10, repeat: -1 });
  this.anims.create({ key: 'enemyAnim', frames: [{ key: 'enemy' }, { key: 'enemy2' }, { key: 'enemy3' }, { key: 'enemy2' }], frameRate: 8, repeat: -1 });
  this.cursors = this.input.keyboard.createCursorKeys();
  this.input.keyboard.on('keydown-SPACE', () => { if (!isDead && !showMenu) { isPaused = !isPaused; managePause.call(this); } });
  this.input.keyboard.on('keydown-Q', () => { if (!isDead && !isPaused && !showMenu) toggleEnemiesStop.call(this); });
  this.input.keyboard.on('keydown-ESC', () => { if (!isDead) toggleMenu.call(this); });
  this.input.keyboard.on('keydown-W', () => { if (!isDead && !showMenu) toggleWeather.call(this); });
  enemies = this.physics.add.group({ allowGravity: false }); specialEnemies = this.physics.add.group({ allowGravity: false }); bonuses = this.physics.add.group({ allowGravity: true });
  this.physics.add.overlap(player, bonuses, (playerObj, bonus) => { if (isDead || isPaused || showMenu) return; if (!doubleJumpActive) activateDoubleJumpBonus.call(this); bonus.destroy(); });
  this.physics.add.collider(bonuses, this.ground, (bonus, ground) => { bonus.body.setVelocityY(0); bonus.body.setGravityY(0); });
  this.physics.add.overlap(player, enemies, (playerObj, enemy) => { if (isDead || isPaused || showMenu) return; if (isInvincible) return; const enemyType = enemy.getData('type'); let hit = false; if (enemyType === 'low') { if (player.body.blocked.down) hit = true; } else { if (!isCrouching) hit = true; } if (hit) playerHit.call(this); });
  this.physics.add.overlap(player, specialEnemies, (playerObj, monster) => { if (isDead || isPaused || showMenu) return; if (isInvincible) return; const monsterData = monster.getData('type'); const monsterHeight = monsterData === 'goldLow' || monsterData === 'silverLow' ? 'low' : 'high'; let hit = false; if (monsterHeight === 'low') { if (player.body.blocked.down) hit = true; } else { if (!isCrouching) hit = true; } if (hit) playerHit.call(this); });
  bonusSpawnTimer = this.time.addEvent({ delay: 8000, loop: true, callback: () => { if (isDead || isPaused || showMenu) return; if (doubleJumpActive) return; if (Math.random() < 0.35) { const bonusX = Math.random() * 600 + 100; let bonus = bonuses.create(bonusX, 50, 'sneaker'); bonus.setScale(0.1); bonus.body.setSize(15, 15, 5, 5); bonus.body.setCollideWorldBounds(true); bonus.setBounce(0.2); } }, callbackScope: this });
  this.time.addEvent({ delay: 1400, loop: true, callback: () => { if (isDead || isPaused || showMenu) return; const enemyType = Math.random() > 0.5 ? 'low' : 'high'; let enemyY, enemyWidth, enemyHeight, offsetX, offsetY; if (enemyType === 'low') { enemyY = this.groundY + 48; enemyWidth = 320; enemyHeight = 320; offsetX = -35; offsetY = -35; } else { enemyY = this.groundY - 15; enemyWidth = 180; enemyHeight = 180; offsetX = -45; offsetY = -45; } let enemy = enemies.create(850, enemyY, 'enemy'); enemy.setVelocityX(enemiesStopped ? 0 : enemiesSpeed); enemy.setScale(0.2); enemy.body.setSize(enemyWidth, enemyHeight, offsetX, offsetY); enemy.play('enemyAnim'); enemy.setData('type', enemyType); enemy.setTint(enemyType === 'low' ? 0xff6666 : 0xaa66ff); enemy.setData('scored', false); }, callbackScope: this });
  this.time.addEvent({ delay: 2500, loop: true, callback: () => { if (isDead || isPaused || showMenu) return; const isGold = Math.random() > 0.5; const isLow = Math.random() > 0.5; let monsterType, monsterY, enemyWidth, enemyHeight, offsetX, offsetY, tintColor; if (isLow) { monsterY = this.groundY + 48; enemyWidth = 320; enemyHeight = 320; offsetX = -35; offsetY = -35; monsterType = isGold ? 'goldLow' : 'silverLow'; } else { monsterY = this.groundY - 15; enemyWidth = 180; enemyHeight = 180; offsetX = -45; offsetY = -45; monsterType = isGold ? 'goldHigh' : 'silverHigh'; } tintColor = isGold ? 0xffd700 : 0xc0c0c0; let monster = specialEnemies.create(-50, monsterY, 'enemy'); monster.setVelocityX(enemiesStopped ? 0 : specialEnemiesSpeed); monster.setScale(0.2); monster.body.setSize(enemyWidth, enemyHeight, offsetX, offsetY); monster.play('enemyAnim'); monster.setData('type', monsterType); monster.setTint(tintColor); monster.setFlipX(true); monster.setData('scored', false); }, callbackScope: this });
  updateHeartsDisplay.call(this);
  scoreFrame = this.add.graphics(); scoreFrame.fillStyle(0x000000, 0.7); scoreFrame.fillRoundedRect(10, 65, 140, 32, 8); scoreFrame.lineStyle(2, 0xffaa44, 0.8); scoreFrame.strokeRoundedRect(10, 65, 140, 32, 8); scoreFrame.setDepth(999);
  scoreText = this.add.text(80, 78, 'Уклонений: 0', { fontSize: '16px', fill: '#ffdd88', fontFamily: 'monospace', fontWeight: 'bold', align: 'center' }); scoreText.setOrigin(0.5, 0.5); scoreText.setDepth(1000);
  menuText = this.add.text(400, 200, '', { fontSize: '20px', fill: '#ffffff', backgroundColor: '#000000', padding: { x: 20, y: 20 }, align: 'center' }); menuText.setOrigin(0.5).setDepth(2000).setVisible(false);
  lightningFlash = this.add.rectangle(400, 200, 800, 400, 0xffffff, 0).setDepth(1500).setVisible(false);
  startRainVisuals.call(this); createDustParticles.call(this); initAudio.call(this); setupMobileControls.call(this);
}
// Функция вибрации с обработкой ошибок и проверкой разрешения
function vibrateDevice() {
  if (!window.navigator || !window.navigator.vibrate) {
    console.log("Вибрация не поддерживается браузером");
    return;
  }
  try {
    // Короткая вибрация 80 мс
    window.navigator.vibrate(80);
  } catch(e) {
    console.log("Ошибка вибрации:", e);
  }
}
function createStarEffect() { for (let i = 0; i < 20; i++) { const angle = Math.random() * Math.PI * 2; const speed = 100 + Math.random() * 180; const vx = Math.cos(angle) * speed; const vy = Math.sin(angle) * speed - 50; const star = this.add.text(player.x, player.y, '✦', { fontSize: '14px', fill: '#ffaa44' }); star.setDepth(600); this.tweens.add({ targets: star, x: star.x + vx * 0.35, y: star.y + vy * 0.35, alpha: 0, scale: { from: 1.2, to: 0.2 }, duration: 550, ease: 'Power2', onComplete: () => star.destroy() }); } }
function shakePlayer() { if (shakeTween) shakeTween.stop(); const originalX = player.x, originalY = player.y; let count = 0; const interval = this.time.addEvent({ delay: 30, repeat: 9, callback: () => { const offX = (Math.random() - 0.5) * 10; const offY = (Math.random() - 0.5) * 6; player.x = originalX + offX; player.y = originalY + offY; count++; if (count >= 10) { player.x = originalX; player.y = originalY; interval.remove(); } }, callbackScope: this }); }
function damageEffect() { 
  createStarEffect.call(this); 
  shakePlayer.call(this); 
  vibrateDevice(); // Вибрация при каждом попадании
}
function createBonusTimer() { if (bonusTimerGraphic) bonusTimerGraphic.destroy(); if (bonusIcon) bonusIcon.destroy(); const radius = 18, x = player.x, y = player.y - 65; bonusTimerGraphic = this.add.graphics(); bonusTimerGraphic.setDepth(550); bonusTimerGraphic.x = x; bonusTimerGraphic.y = y; bonusTimerGraphic.fillStyle(0x000000, 0.7); bonusTimerGraphic.fillCircle(0, 0, radius + 3); bonusTimerGraphic.lineStyle(2, 0xffaa44, 0.8); bonusTimerGraphic.strokeCircle(0, 0, radius); bonusIcon = this.add.image(x, y, 'sneaker'); bonusIcon.setScale(0.12); bonusIcon.setDepth(551); bonusIcon.setTint(0xffdd88); }
function updateBonusTimer() { if (!doubleJumpActive) { if (bonusTimerGraphic) bonusTimerGraphic.destroy(); if (bonusIcon) bonusIcon.destroy(); return; } const elapsed = Date.now() - bonusStartTime, remaining = Math.max(0, BONUS_DURATION - elapsed), percent = remaining / BONUS_DURATION; if (remaining <= 0) { if (bonusTimerGraphic) bonusTimerGraphic.destroy(); if (bonusIcon) bonusIcon.destroy(); return; } const radius = 18, x = player.x, y = player.y - 65; if (bonusTimerGraphic) { bonusTimerGraphic.x = x; bonusTimerGraphic.y = y; bonusTimerGraphic.clear(); bonusTimerGraphic.fillStyle(0x000000, 0.7); bonusTimerGraphic.fillCircle(0, 0, radius + 3); bonusTimerGraphic.lineStyle(2, 0xffaa44, 0.5); bonusTimerGraphic.strokeCircle(0, 0, radius); const angle = 360 * percent; bonusTimerGraphic.lineStyle(3, 0xffaa44, 1); bonusTimerGraphic.beginPath(); bonusTimerGraphic.arc(0, 0, radius - 2, 0, (angle * Math.PI) / 180, false); bonusTimerGraphic.strokePath(); } if (bonusIcon) { bonusIcon.x = x; bonusIcon.y = y; } }
function activateDoubleJumpBonus() { if (doubleJumpActive) return; doubleJumpActive = true; canDoubleJump = true; bonusStartTime = Date.now(); createBonusTimer.call(this); const activationEffect = this.add.circle(player.x, player.y, 30, 0xffaa44, 0.7); this.tweens.add({ targets: activationEffect, scale: { from: 0.5, to: 2 }, alpha: { from: 0.7, to: 0 }, duration: 500, onComplete: () => activationEffect.destroy() }); if (doubleJumpTimer) doubleJumpTimer.remove(); doubleJumpTimer = this.time.delayedCall(BONUS_DURATION, () => { doubleJumpActive = false; canDoubleJump = false; if (bonusTimerGraphic) bonusTimerGraphic.destroy(); if (bonusIcon) bonusIcon.destroy(); }, [], this); const bonusText = this.add.text(player.x, player.y - 50, 'ДВОЙНОЙ ПРЫЖОК!', { fontSize: '16px', fill: '#ffdd88', fontFamily: 'monospace', fontWeight: 'bold' }); bonusText.setOrigin(0.5); this.tweens.add({ targets: bonusText, y: bonusText.y - 40, alpha: 0, duration: 1000, onComplete: () => bonusText.destroy() }); }
function updateScoreDisplay() { if (scoreText) scoreText.setText('Уклонений: ' + score); }
function managePause() { if (isPaused) { this.physics.world.pause(); if (dustParticles) dustParticles.pause(); if (backgroundMusic && !isMuted) backgroundMusic.pause(); } else { this.physics.world.resume(); if (dustParticles) dustParticles.resume(); if (backgroundMusic && !isMuted) backgroundMusic.resume(); } }
function toggleEnemiesStop() { enemiesStopped = !enemiesStopped; enemies.children.iterate(function (e) { if (e && e.body) e.body.setVelocityX(enemiesStopped ? 0 : enemiesSpeed); }); specialEnemies.children.iterate(function (m) { if (m && m.body) m.body.setVelocityX(enemiesStopped ? 0 : specialEnemiesSpeed); }); }
function toggleMenu() { if (isDead) return; showMenu = !showMenu; if (showMenu) { this.physics.world.pause(); if (dustParticles) dustParticles.pause(); if (backgroundMusic && !isMuted) backgroundMusic.pause(); } else { if (!isPaused) { this.physics.world.resume(); if (dustParticles) dustParticles.resume(); if (backgroundMusic && !isMuted) backgroundMusic.resume(); } } }
function toggleWeather() { if (isDead || showMenu) return; if (currentWeather === 'rain') { currentWeather = 'lightning'; startLightningVisuals.call(this); } else { currentWeather = 'rain'; startRainVisuals.call(this); } }
function startRainVisuals() { if (lightningTimer) lightningTimer.remove(); rainDrops.forEach(d => d.destroy()); rainDrops = []; rainStreaks.forEach(s => s.destroy()); rainStreaks = []; for (let i = 0; i < 150; i++) { const drop = this.add.rectangle(Math.random() * 800, Math.random() * 400, 2, Math.random() * 8 + 4, 0x88aaff, Math.random() * 0.5 + 0.3); drop.setDepth(500); rainDrops.push(drop); } for (let i = 0; i < 50; i++) { const streak = this.add.rectangle(Math.random() * 800, Math.random() * 400, 1, Math.random() * 15 + 10, 0xaaccff, Math.random() * 0.4 + 0.2); streak.setDepth(501); rainStreaks.push(streak); } this.bg.setTint(0x6688aa).setAlpha(0.9); }
function startLightningVisuals() { rainDrops.forEach(d => d.destroy()); rainDrops = []; rainStreaks.forEach(s => s.destroy()); rainStreaks = []; this.bg.clearTint().setAlpha(1); if (lightningTimer) lightningTimer.remove(); lightningTimer = this.time.addEvent({ delay: 4000, callback: () => { if (isPaused || showMenu || isDead) return; lightningFlash.setVisible(true).setAlpha(0.8); this.tweens.add({ targets: lightningFlash, alpha: 0, duration: 200, onComplete: () => { lightningFlash.setVisible(false); lightningFlash.setAlpha(0.8); } }); this.cameras.main.shake(150, 0.015); const bolt = this.add.graphics(); const startX = Math.random() * 800; let cx = startX, cy = 0; bolt.lineStyle(4, 0xffdd88, 1).beginPath().moveTo(startX, 0); for (let i = 0; i < 12; i++) { cx += (Math.random() - 0.5) * 50; cy += 35; bolt.lineTo(cx, cy); } bolt.strokePath().setDepth(1501); this.time.delayedCall(150, () => bolt.destroy()); }, callbackScope: this, loop: true }); }
function updateHeartsDisplay() { hearts.forEach(h => h.destroy()); hearts = []; for (let i = 0; i < lives; i++) hearts.push(this.add.image(30 + (i * 40), 30, 'heart').setScale(0.5).setDepth(1000)); }
function playerHit() { if (isDead || isPaused || showMenu) return; if (isInvincible) return; lives--; updateHeartsDisplay.call(this); damageEffect.call(this); isInvincible = true; player.setTint(0xff8888); if (invincibleTimer) invincibleTimer.remove(); invincibleTimer = this.time.delayedCall(1500, () => { isInvincible = false; player.clearTint(); }, [], this); if (lives <= 0) { isDead = true; player.stop(); player.setTexture('run1'); player.setVelocityY(-300); player.setVelocityX(0); player.setTint(0xff0000); this.tweens.add({ targets: player, angle: 90, duration: 500, ease: 'Bounce.easeOut' }); deathTimer = this.time.delayedCall(1500, () => this.scene.restart()); } }
function createDustParticles() { dustParticles = this.add.particles(0, 0, null, { speed: { min: 20, max: 50 }, angle: { min: 150, max: 210 }, scale: { start: 0.3, end: 0 }, alpha: { start: 0.6, end: 0 }, lifespan: 400, quantity: 2, tint: 0x8B7355 }); const g = this.add.graphics(); g.fillStyle(0x8B7355, 1); g.fillCircle(4, 4, 4); g.generateTexture('dust', 8, 8); g.clear(); dustParticles.setTexture('dust').setDepth(800); }
function addFootprint(x, y) { if (footprints.length > 30) footprints.shift().destroy(); const fp = this.add.ellipse(x, y + 15, 8, 5, 0x5C4033, 0.5).setDepth(600); this.tweens.add({ targets: fp, alpha: 0, duration: 5000, onComplete: () => fp.destroy() }); footprints.push(fp); }
