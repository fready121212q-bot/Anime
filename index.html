<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Runner Game - Full Mobile Edition</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
  <style>
    * { touch-action: none; }
    
    .audio-control {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 10000;
      background: rgba(0,0,0,0.7);
      border-radius: 30px;
      padding: 8px 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .audio-icon { font-size: 24px; color: white; }
    .volume-slider { width: 80px; height: 4px; -webkit-appearance: none; background: #444; border-radius: 2px; }
    .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; }
    .volume-value { color: white; font-size: 12px; min-width: 35px; }
    
    .mobile-controls {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10000;
      pointer-events: none;
    }
    
    .control-panel {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border-radius: 80px;
      padding: 15px 25px;
      display: flex;
      gap: 20px;
      pointer-events: auto;
      border: 2px solid rgba(255,255,255,0.3);
    }
    
    .control-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      border: 3px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      -webkit-tap-highlight-color: transparent;
    }
    
    .action-buttons {
      display: flex;
      gap: 20px;
      pointer-events: auto;
    }
    
    .action-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      -webkit-tap-highlight-color: transparent;
      border: 3px solid white;
    }
    
    .jump-btn { background: rgba(76, 175, 80, 0.8); border-color: #4CAF50; }
    .crouch-btn { background: rgba(255, 152, 0, 0.8); border-color: #FF9800; }
    
    .pause-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background: rgba(0,0,0,0.8);
      border: 2px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      z-index: 10000;
      color: white;
      -webkit-tap-highlight-color: transparent;
    }
    
    @media (max-width: 768px) {
      .control-btn { width: 55px; height: 55px; font-size: 28px; }
      .action-btn { width: 65px; height: 65px; font-size: 32px; }
      .control-panel { padding: 12px 20px; gap: 15px; }
    }
    
    @media (max-width: 480px) {
      .control-btn { width: 50px; height: 50px; font-size: 24px; }
      .action-btn { width: 60px; height: 60px; font-size: 28px; }
    }
    
    .mobile-tutorial {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.95);
      color: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      z-index: 20000;
      max-width: 80%;
      animation: fadeOut 3s forwards;
      pointer-events: none;
    }
    
    @keyframes fadeOut {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
    
    .music-launch-btn {
      position: fixed;
      bottom: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      z-index: 30000;
      white-space: nowrap;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.05); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }
    
    .control-btn:active, .action-btn:active, .pause-btn:active { opacity: 0.7; }
  </style>
</head>

<body>
<div class="audio-control" id="audioControl">
  <div class="audio-icon" id="audioIcon">🔊</div>
  <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="50">
  <div class="volume-value" id="volumeValue">50%</div>
</div>

<div class="mobile-controls">
  <div class="control-panel">
    <div class="control-btn" id="moveLeftBtn">◀</div>
    <div class="control-btn" id="moveRightBtn">▶</div>
  </div>
  <div class="action-buttons">
    <div class="action-btn jump-btn" id="jumpBtn">▲</div>
    <div class="action-btn crouch-btn" id="crouchBtn">▼</div>
  </div>
</div>
<div class="pause-btn" id="pauseBtn">⏸</div>
<div class="mobile-tutorial" id="mobileTutorial">
  <h3>🎮 УПРАВЛЕНИЕ</h3>
  <p>◀ ▶ - ДВИЖЕНИЕ (УДЕРЖИВАТЬ)</p>
  <p>▲ - ПРЫЖОК (УДЕРЖИВАТЬ)</p>
  <p>▼ - ПРИСЕДАНИЕ (УДЕРЖИВАТЬ)</p>
  <p>КРАСНЫЕ ВРАГИ - ПРЫГАТЬ</p>
  <p>ФИОЛЕТОВЫЕ ВРАГИ - ПРИСЕДАТЬ</p>
</div>
<button class="music-launch-btn" id="musicLaunchBtn">🎵 ЗАПУСТИТЬ МУЗЫКУ 🎵</button>

<script>
let player, enemies;
let isDead = false;
let lives = 3;
let hearts = [];
let isPaused = false;
let enemiesSpeed = -200;
let lastDirection = 'right';
let isCrouching = false;
let enemiesStopped = false;
let showMenu = false;
let menuText;
let backgroundMusic = null;
let isMuted = false;
let currentVolume = 0.5;
let rainDrops = [];
let rainStreaks = [];
let lightningFlash;
let lightningTimer;
let currentWeather = 'rain';
let dustParticles;
let footprints = [];
let footprintDelay = 0;
let gameScene = null;

// Мобильные флаги - ВСЕ ПО ОДИНАКОВОЙ ЛОГИКЕ
let leftPressed = false;
let rightPressed = false;
let jumpPressed = false;
let crouchPressed = false;
let jumpCooldown = 0;

const game = new Phaser.Game({
  type: Phaser.AUTO,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: 800,
    height: 400
  },
  physics: {
    default: 'arcade',
    arcade: { gravity: { y: 800 } }
  },
  scene: {
    preload, create, update
  }
});

function preload() {
  this.load.image('bg', 'bg.png');
  this.load.image('run1', 'run1.png');
  this.load.image('run2', 'run2.png');
  this.load.image('run3', 'run3.png');
  this.load.image('run4', 'run4.png');
  this.load.image('crouch', 'crouch.png');
  this.load.image('enemy', 'enemy.png');
  this.load.image('enemy2', 'enemy2.png');
  this.load.image('enemy3', 'enemy3.png');
  this.load.image('heart', 'heart.png');
  this.load.audio('bgMusic', 'music.mp3');
}

function create() {
  gameScene = this;
  this.groundY = 320;

  this.bg = this.add.image(400, 200, 'bg');
  this.bg.displayWidth = 800;
  this.bg.displayHeight = 400;

  this.ground = this.physics.add.staticGroup();
  let groundBlock = this.ground.create(400, this.groundY + 40).setDisplaySize(800, 40).refreshBody();
  groundBlock.visible = false;

  player = this.physics.add.sprite(200, this.groundY, 'run1');
  player.setScale(0.25);
  player.setCollideWorldBounds(true);
  this.physics.add.collider(player, this.ground);
  player.body.setSize(55, 58, 1, 2);

  this.anims.create({ key: 'run', frames: ['run1','run2','run3','run4'], frameRate: 10, repeat: -1 });
  this.anims.create({ key: 'enemyAnim', frames: ['enemy','enemy2','enemy3','enemy2'], frameRate: 8, repeat: -1 });

  this.cursors = this.input.keyboard.createCursorKeys();

  this.input.keyboard.on('keydown-SPACE', () => {
    if (!isDead && !showMenu) {
      isPaused = !isPaused;
      if (isPaused) {
        this.physics.world.pause();
        if (dustParticles) dustParticles.pause();
        if (backgroundMusic && !isMuted) backgroundMusic.pause();
      } else {
        this.physics.world.resume();
        if (dustParticles) dustParticles.resume();
        if (backgroundMusic && !isMuted && !isPaused) backgroundMusic.resume();
      }
    }
  });
  
  this.input.keyboard.on('keydown-Q', () => {
    if (!isDead && !isPaused && !showMenu) {
      enemiesStopped = !enemiesStopped;
      enemies.children.iterate(function (enemy) {
        if (enemy && enemy.body) {
          if (enemiesStopped) enemy.body.setVelocityX(0);
          else enemy.body.setVelocityX(enemiesSpeed);
        }
      });
    }
  });
  
  this.input.keyboard.on('keydown-ESC', () => {
    if (!isDead) {
      showMenu = !showMenu;
      if (showMenu) {
        this.physics.world.pause();
        if (dustParticles) dustParticles.pause();
        if (backgroundMusic && !isMuted) backgroundMusic.pause();
      } else {
        if (!isPaused) {
          this.physics.world.resume();
          if (dustParticles) dustParticles.resume();
          if (backgroundMusic && !isMuted) backgroundMusic.resume();
        }
      }
    }
  });
  
  this.input.keyboard.on('keydown-W', () => {
    if (!isDead && !showMenu) {
      if (currentWeather === 'rain') {
        currentWeather = 'lightning';
        startLightning();
      } else {
        currentWeather = 'rain';
        startRain();
      }
    }
  });

  enemies = this.physics.add.group({ allowGravity: false });

  this.physics.add.overlap(player, enemies, (p, e) => {
    if (isDead || isPaused || showMenu) return;
    if (e.getData('type') === 'low') {
      if (player.body.blocked.down) playerHit();
    } else {
      if (!isCrouching) playerHit();
    }
    e.destroy();
  });

  this.time.addEvent({
    delay: 1400, loop: true,
    callback: () => {
      if (isDead || isPaused || showMenu) return;
      let type = Math.random() > 0.5 ? 'low' : 'high';
      let y = type === 'low' ? this.groundY + 48 : this.groundY - 15;
      let color = type === 'low' ? 0xff6666 : 0xaa66ff;
      let w = type === 'low' ? 320 : 180;
      let h = type === 'low' ? 320 : 180;
      let ox = type === 'low' ? -35 : -45;
      let oy = type === 'low' ? -35 : -45;
      let enemy = enemies.create(850, y, 'enemy');
      enemy.setVelocityX(enemiesStopped ? 0 : enemiesSpeed);
      enemy.setScale(0.2);
      enemy.body.setSize(w, h, ox, oy);
      enemy.play('enemyAnim');
      enemy.setData('type', type);
      enemy.setTint(color);
    }
  });
  
  updateHearts();
  
  menuText = this.add.text(400, 200, '', {
    fontSize: '20px', fill: '#ffffff', backgroundColor: '#000000',
    padding: { x: 20, y: 20 }, align: 'center'
  }).setOrigin(0.5).setDepth(2000).setVisible(false);
  
  lightningFlash = this.add.rectangle(400, 200, 800, 400, 0xffffff, 0).setDepth(1500).setVisible(false);
  
  startRain();
  createDust();
  setupTouchControls();
}

function setupTouchControls() {
  const leftBtn = document.getElementById('moveLeftBtn');
  const rightBtn = document.getElementById('moveRightBtn');
  const jumpBtn = document.getElementById('jumpBtn');
  const crouchBtn = document.getElementById('crouchBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const musicBtn = document.getElementById('musicLaunchBtn');
  
  if(leftBtn) {
    leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); leftPressed = true; });
    leftBtn.addEventListener('touchend', (e) => { e.preventDefault(); leftPressed = false; });
    leftBtn.addEventListener('touchcancel', (e) => { leftPressed = false; });
    leftBtn.addEventListener('mousedown', () => { leftPressed = true; });
    leftBtn.addEventListener('mouseup', () => { leftPressed = false; });
  }
  
  if(rightBtn) {
    rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rightPressed = true; });
    rightBtn.addEventListener('touchend', (e) => { e.preventDefault(); rightPressed = false; });
    rightBtn.addEventListener('touchcancel', (e) => { rightPressed = false; });
    rightBtn.addEventListener('mousedown', () => { rightPressed = true; });
    rightBtn.addEventListener('mouseup', () => { rightPressed = false; });
  }
  
  if(jumpBtn) {
    jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); jumpPressed = true; });
    jumpBtn.addEventListener('touchend', (e) => { e.preventDefault(); jumpPressed = false; });
    jumpBtn.addEventListener('touchcancel', (e) => { jumpPressed = false; });
    jumpBtn.addEventListener('mousedown', () => { jumpPressed = true; });
    jumpBtn.addEventListener('mouseup', () => { jumpPressed = false; });
  }
  
  if(crouchBtn) {
    crouchBtn.addEventListener('touchstart', (e) => { e.preventDefault(); crouchPressed = true; });
    crouchBtn.addEventListener('touchend', (e) => { e.preventDefault(); crouchPressed = false; });
    crouchBtn.addEventListener('touchcancel', (e) => { crouchPressed = false; });
    crouchBtn.addEventListener('mousedown', () => { crouchPressed = true; });
    crouchBtn.addEventListener('mouseup', () => { crouchPressed = false; });
  }
  
  if(pauseBtn) {
    pauseBtn.addEventListener('click', () => {
      if(!isDead && !showMenu && gameScene) {
        isPaused = !isPaused;
        if(isPaused) {
          gameScene.physics.world.pause();
          if(dustParticles) dustParticles.pause();
          if(backgroundMusic && !isMuted) backgroundMusic.pause();
          pauseBtn.textContent = '▶';
        } else {
          gameScene.physics.world.resume();
          if(dustParticles) dustParticles.resume();
          if(backgroundMusic && !isMuted) backgroundMusic.resume();
          pauseBtn.textContent = '⏸';
        }
      }
    });
  }
  
  if(musicBtn) {
    musicBtn.addEventListener('click', () => {
      if(gameScene) {
        backgroundMusic = gameScene.sound.add('bgMusic', { loop: true, volume: currentVolume });
        backgroundMusic.play();
        musicBtn.style.display = 'none';
        setupAudio();
      }
    });
  }
  
  setTimeout(() => {
    let tut = document.getElementById('mobileTutorial');
    if(tut) tut.style.display = 'none';
  }, 5000);
}

function setupAudio() {
  const slider = document.getElementById('volumeSlider');
  const val = document.getElementById('volumeValue');
  const icon = document.getElementById('audioIcon');
  if(slider && !slider.hasListener) {
    slider.value = currentVolume * 100;
    val.textContent = Math.round(currentVolume * 100) + '%';
    slider.hasListener = true;
    slider.addEventListener('input', (e) => {
      currentVolume = e.target.value / 100;
      val.textContent = e.target.value + '%';
      if(backgroundMusic) backgroundMusic.setVolume(currentVolume);
      if(currentVolume === 0) { icon.textContent = '🔇'; isMuted = true; }
      else { icon.textContent = '🔊'; isMuted = false; }
    });
    document.getElementById('audioControl').addEventListener('click', (e) => {
      if(e.target !== slider) {
        if(isMuted) {
          currentVolume = 0.5;
          slider.value = 50;
          val.textContent = '50%';
          if(backgroundMusic) backgroundMusic.setVolume(0.5);
          icon.textContent = '🔊';
          isMuted = false;
        } else {
          currentVolume = 0;
          slider.value = 0;
          val.textContent = '0%';
          if(backgroundMusic) backgroundMusic.setVolume(0);
          icon.textContent = '🔇';
          isMuted = true;
        }
      }
    });
  }
}

function createDust() {
  dustParticles = this.add.particles(0, 0, null, {
    speed: { min: 20, max: 50 }, angle: { min: 150, max: 210 },
    scale: { start: 0.3, end: 0 }, alpha: { start: 0.6, end: 0 },
    lifespan: 400, quantity: 2, tint: 0x8B7355
  });
  let g = this.add.graphics();
  g.fillStyle(0x8B7355).fillCircle(4, 4, 4);
  g.generateTexture('dust', 8, 8);
  g.clear();
  dustParticles.setTexture('dust').setDepth(800);
}

function addFootprint(x, y) {
  if(footprints.length > 30) footprints.shift().destroy();
  let fp = this.add.ellipse(x, y + 15, 8, 5, 0x5C4033, 0.5).setDepth(600);
  this.tweens.add({ targets: fp, alpha: 0, duration: 5000, onComplete: () => fp.destroy() });
  footprints.push(fp);
}

function startRain() {
  rainDrops.forEach(d => d.destroy());
  rainDrops = [];
  for(let i=0;i<150;i++) {
    rainDrops.push(this.add.rectangle(Math.random()*800, Math.random()*400, 2, Math.random()*8+4, 0x88aaff, Math.random()*0.5+0.3).setDepth(500));
  }
  rainStreaks.forEach(s => s.destroy());
  rainStreaks = [];
  for(let i=0;i<50;i++) {
    rainStreaks.push(this.add.rectangle(Math.random()*800, Math.random()*400, 1, Math.random()*15+10, 0xaaccff, Math.random()*0.4+0.2).setDepth(501));
  }
  this.bg.setTint(0x6688aa).setAlpha(0.9);
  if(lightningTimer) lightningTimer.remove();
}

function startLightning() {
  rainDrops.forEach(d => d.destroy());
  rainDrops = [];
  rainStreaks.forEach(s => s.destroy());
  rainStreaks = [];
  this.bg.clearTint();
  this.bg.setAlpha(1);
  if(lightningTimer) lightningTimer.remove();
  lightningTimer = this.time.addEvent({
    delay: 4000, loop: true,
    callback: () => {
      if(isPaused || showMenu || isDead) return;
      lightningFlash.setVisible(true);
      lightningFlash.setAlpha(0.8);
      this.tweens.add({
        targets: lightningFlash, alpha: 0, duration: 200,
        onComplete: () => { lightningFlash.setVisible(false); lightningFlash.setAlpha(0.8); }
      });
      this.cameras.main.shake(150, 0.015);
      let bolt = this.add.graphics();
      let cx = Math.random() * 800, cy = 0;
      bolt.lineStyle(4, 0xffdd88, 1);
      bolt.beginPath();
      bolt.moveTo(cx, 0);
      for(let i=0;i<12;i++) { cx += (Math.random() - 0.5) * 50; cy += 35; bolt.lineTo(cx, cy); }
      bolt.strokePath();
      bolt.setDepth(1501);
      this.time.delayedCall(150, () => bolt.destroy());
    }
  });
}

function updateHearts() {
  hearts.forEach(h => h.destroy());
  hearts = [];
  for(let i=0;i<lives;i++) {
    hearts.push(this.add.image(30 + i*40, 30, 'heart').setScale(0.5).setDepth(1000));
  }
}

function playerHit() {
  if(isDead || isPaused || showMenu) return;
  lives--;
  updateHearts.call(this);
  this.cameras.main.flash(500, 255, 0, 0);
  if(lives <= 0) {
    isDead = true;
    player.stop();
    player.setTexture('run1').setVelocityY(-300).setVelocityX(0).setTint(0xff0000);
    this.tweens.add({ targets: player, angle: 90, duration: 500, ease: 'Bounce.easeOut' });
    this.time.delayedCall(1500, () => this.scene.restart());
  } else {
    isDead = true;
    player.setTint(0xff0000).setVelocityX(-300).setVelocityY(-200);
    enemies.children.iterate(e => e.destroy());
    this.time.delayedCall(1000, () => {
      isDead = false;
      player.clearTint().setVelocityX(0);
      this.tweens.add({ targets: player, alpha: 0.5, duration: 100, yoyo: true, repeat: 5, onComplete: () => player.alpha = 1 });
    });
  }
}

function update() {
  if(showMenu) {
    menuText.setVisible(true);
    menuText.setText('========== МЕНЮ ==========\n\nУПРАВЛЕНИЕ:\n← → - движение (удерживать)\n▲ - ПРЫЖОК (удерживать)\n▼ - ПРИСЕДАНИЕ (удерживать)\n\nВРАГИ:\n🔴 КРАСНЫЕ (по земле) - ПРЫГАЙ\n🟣 ФИОЛЕТОВЫЕ (голова) - ПРИСЕДАЙ\n\nSPACE - пауза\nQ - стоп врагов\nW - смена погоды\nESC - закрыть меню');
  } else menuText.setVisible(false);
  
  if(isDead || isPaused || showMenu) return;
  
  if(currentWeather === 'rain') {
    rainDrops.forEach(d => { d.y += 8; if(d.y > 400) { d.y = -10; d.x = Math.random() * 800; } });
    rainStreaks.forEach(s => { s.y += 12; if(s.y > 400) { s.y = -20; s.x = Math.random() * 800; } });
  }
  
  const onGround = player.body.blocked.down;
  
  // ПРИСЕДАНИЕ
  if((this.cursors.down.isDown || crouchPressed) && onGround && !isCrouching) {
    isCrouching = true;
    player.body.setSize(55, 35, 1, 23);
    player.setTexture('crouch').setScale(0.25).stop();
    player.setVelocityX(0);
    player.setFlipX(lastDirection === 'left');
  } else if(!this.cursors.down.isDown && !crouchPressed && isCrouching) {
    isCrouching = false;
    player.body.setSize(55, 58, 1, 2);
    player.setTexture('run1').setScale(0.25);
    player.setFlipX(lastDirection === 'left');
  }
  
  if(isCrouching) return;
  
  // ДВИЖЕНИЕ
  let moving = false;
  player.setVelocityX(0);
  
  if(this.cursors.left.isDown || leftPressed) {
    player.setVelocityX(-250);
    moving = true;
    lastDirection = 'left';
    player.setFlipX(true);
  }
  if(this.cursors.right.isDown || rightPressed) {
    player.setVelocityX(250);
    moving = true;
    lastDirection = 'right';
    player.setFlipX(false);
  }
  
  // ПРЫЖОК
  if((this.cursors.up.isDown || jumpPressed) && onGround) {
    if(jumpCooldown <= 0) {
      player.setVelocityY(-260);
      moving = true;
      jumpCooldown = 12;
    }
  }
  if(jumpCooldown > 0) jumpCooldown--;
  
  if(moving && onGround && !isCrouching) {
    if(dustParticles) {
      dustParticles.emitParticleAt(player.x - 15, player.y + 20);
      dustParticles.emitParticleAt(player.x + 15, player.y + 20);
    }
    footprintDelay++;
    if(footprintDelay > 15) {
      footprintDelay = 0;
      addFootprint.call(this, player.x, player.y);
    }
  }
  
  if(moving) { if(!player.anims.isPlaying) player.play('run'); }
  else {
    if(player.anims.isPlaying) player.stop();
    player.setTexture('run1').setFlipX(lastDirection === 'left');
  }
  
  enemies.children.iterate(e => { if(e.x < -100) e.destroy(); });
}
</script>
